workflows:
  unity-android:
    name: Snake Rescue Android
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        PACKAGE_NAME: com.mohammedauwal.snakerescue
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Build Unity Project
        script: |
          # Find Unity installation
          UNITY_PATH=$(mdfind "kMDItemCFBundleIdentifier == 'com.unity3d.UnityEditor'" | head -1)
          
          if [ -z "$UNITY_PATH" ]; then
            UNITY_PATH="/Applications/Unity/Hub/Editor/2022.3.0f1/Unity.app"
          fi
          
          echo "Unity Path: $UNITY_PATH"
          
          # Build the project
          "$UNITY_PATH/Contents/MacOS/Unity" \
            -batchmode \
            -quit \
            -projectPath . \
            -buildTarget Android \
            -executeMethod UnityEditor.BuildPlayerWindow.BuildPlayerMethod \
            -logFile /dev/stdout \
            -nographics \
            -outputPath build/SnakeRescue.apk
    artifacts:
      - build/*.apk
